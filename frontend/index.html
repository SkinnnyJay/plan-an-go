<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>plan-an-go — Agents / Swarms</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-200">
    <header class="border-b border-slate-700 bg-slate-800/80 px-4 py-3">
      <h1 class="text-lg font-semibold tracking-tight text-green-400">plan-an-go</h1>
      <p class="text-xs text-slate-400">Agents / Swarms — view, execute, outputs</p>
    </header>

    <main class="mx-auto max-w-6xl space-y-4 p-4">
      <!-- View -->
      <section class="rounded-lg border border-slate-700 bg-slate-800/50 p-4">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-sm font-medium uppercase tracking-wider text-slate-400">View</h2>
          <div class="flex gap-2">
            <button id="view-plan" type="button" class="rounded bg-slate-700 px-3 py-1.5 text-xs font-medium text-slate-200 hover:bg-slate-600">Plan</button>
            <button id="view-prd" type="button" class="rounded bg-slate-700 px-3 py-1.5 text-xs font-medium text-slate-200 hover:bg-slate-600">PRD</button>
          </div>
        </div>
        <div id="view-content" class="min-h-[120px] rounded border border-slate-600 bg-slate-900/80 p-3 font-mono text-sm text-slate-300 whitespace-pre-wrap"></div>
      </section>

      <!-- Execute + Custom arguments -->
      <section class="rounded-lg border border-slate-700 bg-slate-800/50 p-4">
        <h2 class="mb-2 text-sm font-medium uppercase tracking-wider text-slate-400">Execute</h2>
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
          <label class="flex-1">
            <span class="mb-1 block text-xs text-slate-500">Custom arguments</span>
            <input id="custom-args" type="text" placeholder="e.g. --plan PLAN.md --no-slack" class="w-full rounded border border-slate-600 bg-slate-900 px-3 py-2 font-mono text-sm text-slate-200 placeholder-slate-500 focus:border-green-500 focus:outline-none focus:ring-1 focus:ring-green-500" />
          </label>
          <button id="execute-btn" type="button" class="mt-2 shrink-0 rounded bg-green-600 px-4 py-2 text-sm font-medium text-white hover:bg-green-500 sm:mt-6">Run</button>
        </div>
      </section>

      <!-- Outputs -->
      <section class="rounded-lg border border-slate-700 bg-slate-800/50 p-4">
        <h2 class="mb-2 text-sm font-medium uppercase tracking-wider text-slate-400">Outputs</h2>
        <div id="outputs" class="max-h-[320px] overflow-y-auto rounded border border-slate-600 bg-slate-950 p-3"></div>
      </section>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
