# Lint and format only. Tests require local CLIs (claude, codex, etc.) and run on pre-commit locally.
# ShellCheck and shfmt versions are pinned to match local (brew install shellcheck shfmt) so CI matches npm run check.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ShellCheck (pinned to match local)
        run: |
          sudo apt-get update && sudo apt-get install -y xz-utils wget
          SC_VERSION="0.11.0"
          wget -qO- "https://github.com/koalaman/shellcheck/releases/download/v${SC_VERSION}/shellcheck-v${SC_VERSION}.linux.x86_64.tar.xz" | tar -xJv -C /tmp
          sudo mv /tmp/shellcheck-v*/shellcheck /usr/local/bin/
          shellcheck --version

      - name: Install shfmt (pinned)
        uses: mfinelli/setup-shfmt@v4
        with:
          shfmt-version: "3.12.0"

      - name: Print tool versions
        run: |
          shellcheck --version
          shfmt -version

      - name: Install dependencies
        run: npm ci

      - name: Run lint and format check (no tests; run tests locally before commit)
        run: npm run check
