# Lint and format only. Tests require local CLIs (claude, codex, etc.) and run on pre-commit locally.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install shfmt
        uses: mfinelli/setup-shfmt@v4

      - name: Install dependencies
        run: npm ci

      - name: Run lint and format check (no tests; run tests locally before commit)
        run: npm run check
